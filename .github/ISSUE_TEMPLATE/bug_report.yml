name: Bug report
description: Report a reproducible bug in Payment Control
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve Payment Control.
        Please provide concise and reproducible details.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the issue and impact.
      placeholder: "Example: Opening Travel receipts modal shows a blank surface after selecting a trip."
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List exact steps so we can reproduce quickly.
      placeholder: |
        1. Open ...
        2. Tap ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: "What should happen instead?"
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Device + OS + browser/Telegram client version.
      placeholder: "Android 14, Telegram 11.x, Chrome WebView"
    validations:
      required: true
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Logs, screenshots, and screen recordings if available.
