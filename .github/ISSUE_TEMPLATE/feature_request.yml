name: Feature request
description: Suggest a focused improvement for Payment Control
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion.
        Please focus on the user problem first, then the proposed solution.
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What user pain are you trying to solve?
      placeholder: "I want to ... but currently ..."
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What change would help?
      placeholder: "A compact modal with ... would help because ..."
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional alternatives or trade-offs.
  - type: checkboxes
    id: checks
    attributes:
      label: Validation
      options:
        - label: I checked for similar open issues.
          required: true
        - label: This request is focused on a concrete user workflow.
          required: true
